# Pre-commit hooks: file hygiene, Python lint/format/type-check, clang-format.
# Install once with `pre-commit install`; run everything with
# `pre-commit run --all-files`. CI does not run these -- the parity workflow's
# own gates (clang-format first) stay the authority; this catches the same
# classes before the commit exists.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
        # Never touch byte-exact comparison inputs: goldens are matched against
        # engine output verbatim, perft.table and the .fens batteries are gate
        # inputs, and .nnue is data.
        exclude: '\.(golden|fens|table|epd|nnue)$'
      - id: trailing-whitespace
        exclude: '\.(golden|fens|table|epd|nnue)$'
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/astral-sh/ty-pre-commit
    rev: v0.0.63
    hooks:
      # The hook's own entry checks the whole project (ty's cross-file
      # diagnostics make per-filename invocation wrong); tools/ is the only
      # Python in the tree, and [tool.ty] in pyproject.toml pins the env.
      - id: ty
  - repo: local
    hooks:
      # clang-format is CI's first gate and blocks everything after it; run the
      # repo's own gate here so drift never reaches CI. Through build.sh, not a
      # bare clang-format entry: find_clang_format resolves the versioned binary
      # names (clang-format-22) that a bare entry misses, and a third-party
      # mirror would add a supply-chain edge for one command. Whole-tree, like
      # the gate: the check is seconds, and staged-file scoping buys nothing.
      - id: clang-format
        name: build.sh fmt
        entry: ./build.sh fmt
        language: system
        files: '^(src|tests)/.*\.(c|h)$'
        pass_filenames: false
      # Docs are part of the change (AGENTS.md): a doc edit that breaks a link,
      # names a dead path, or contradicts the bench anchor should fail here, not
      # in CI.
      - id: docs-lint
        name: build.sh docs-lint
        entry: ./build.sh docs-lint
        language: system
        files: '\.md$'
        pass_filenames: false
